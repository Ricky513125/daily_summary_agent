name: Daily Literature Review Auto-Run (V5)

on:
  schedule:
    # UTC 02:00 = Singapore/Beijing 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily-task-v5:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ENABLE_ARXIV: "true"
      ARXIV_DAYS_AGO: ${{ vars.ARXIV_DAYS_AGO || '1' }}
      ARXIV_CATEGORIES: ${{ vars.ARXIV_CATEGORIES || 'cs.CL,cs.CV,cs.AI,cs.LG' }}
      ARXIV_MAX_RESULTS_PER_KEYWORD: ${{ vars.ARXIV_MAX_RESULTS_PER_KEYWORD || '10' }}

      # V5 沿用 V4 关键词配置
      KEYWORDS_V4: ${{ vars.KEYWORDS_V4 || '' }}
      EXCLUDE_CATEGORIES_V4: ${{ vars.EXCLUDE_CATEGORIES_V4 || '' }}
      EXCLUDE_KEYWORDS_V4: ${{ vars.EXCLUDE_KEYWORDS_V4 || '' }}

      EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'false' }}
      SMTP_SERVER: ${{ vars.SMTP_SERVER || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      RECEIVER_EMAILS: ${{ vars.RECEIVER_EMAILS || '' }}
      ARCHIVE_URLS: ${{ vars.ARCHIVE_URLS || '' }}

      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      QWEN_MODEL: ${{ vars.QWEN_MODEL || 'qwen-plus' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run V5 literature review script
        run: python run_v5.py

      - name: Commit and push generated summaries
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -d output ]; then git add -f output; fi
          git diff --cached --quiet && echo "No generated summaries to commit" && exit 0
          git commit -m "docs: auto update daily literature review (v5)"
          git push
