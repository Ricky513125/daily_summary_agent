name: Daily Literature Review Auto-Run

on:
  schedule:
    # GitHub Actions cron uses UTC. 00:00 UTC = 08:00 Singapore/Beijing time.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-daily-task:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      ENABLE_ARXIV: "true"
      ARXIV_DAYS_AGO: ${{ vars.ARXIV_DAYS_AGO || '1' }}
      ARXIV_CATEGORIES: ${{ vars.ARXIV_CATEGORIES || 'cs.AI,cs.CV,cs.LG,cs.CL' }}
      ARXIV_MAX_RESULTS_PER_KEYWORD: ${{ vars.ARXIV_MAX_RESULTS_PER_KEYWORD || '10' }}
      ARXIV_DOWNLOAD_PDF: ${{ vars.ARXIV_DOWNLOAD_PDF || 'false' }}
      KEYWORDS: ${{ vars.KEYWORDS || '大模型,AI,人工智能,计算机视觉,深度学习,机器学习,LLM,GPT,transformer' }}
      DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
      QWEN_MODEL: ${{ vars.QWEN_MODEL || 'qwen-plus' }}
      EMAIL_ENABLED: ${{ vars.EMAIL_ENABLED || 'false' }}
      SMTP_SERVER: ${{ vars.SMTP_SERVER || 'smtp.gmail.com' }}
      SMTP_PORT: ${{ vars.SMTP_PORT || '465' }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      RECEIVER_EMAILS: ${{ vars.RECEIVER_EMAILS || '' }}
      # Prefer secret (some users store it as a secret), then fall back to variable.
      CLOUD_BACKUP_REMOTE: ${{ secrets.CLOUD_BACKUP_REMOTE || vars.CLOUD_BACKUP_REMOTE || 'backup:DailySummaryAgent' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run literature review script
        run: python run_v3.py

      - name: Back up generated files to cloud drive
        env:
          RCLONE_CONFIG_CONTENT: ${{ secrets.RCLONE_CONFIG }}
        run: |
          if [ -z "$RCLONE_CONFIG_CONTENT" ]; then
            echo "RCLONE_CONFIG secret is not set; skipping cloud drive backup"
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y rclone

          mkdir -p ~/.config/rclone
          printf "%s" "$RCLONE_CONFIG_CONTENT" > ~/.config/rclone/rclone.conf

          # CLOUD_BACKUP_REMOTE must be in the form "<remote>:<path>", e.g. "gdrive:DailySummaryAgent"
          if ! printf "%s" "$CLOUD_BACKUP_REMOTE" | grep -q ":"; then
            echo "CLOUD_BACKUP_REMOTE is invalid (missing ':'). Example: gdrive:DailySummaryAgent"
            echo "Current value is set but not shown here because it may be a secret."
            exit 0
          fi

          if [ -d output ]; then
            rclone copy output "$CLOUD_BACKUP_REMOTE/output" --create-empty-src-dirs
          fi

          if [ -d data/papers ]; then
            rclone copy data/papers "$CLOUD_BACKUP_REMOTE/papers" --create-empty-src-dirs
          fi

      - name: Commit and push generated summaries
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -d output ]; then git add -f output; fi
          git diff --cached --quiet && echo "No generated summaries to commit" && exit 0
          git commit -m "docs: auto update daily literature review"
          git push
